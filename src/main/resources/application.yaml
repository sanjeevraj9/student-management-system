spring:
  application:
    name: student-management-System

  datasource:
    url: jdbc:mysql://localhost:3306/student_management_system
    username : YOUR_USERNAME
    password : YOUR_PASSWORD


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql : true
    database-platform: org.hibernate.dialect.MySQLDialect
server:
  port: 8082
